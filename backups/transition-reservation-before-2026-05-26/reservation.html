<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>1820 | Reservation</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #080808;
      color: #f2f2f2;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    body {
      display: grid;
      min-height: 100vh;
      padding: clamp(22px, 4vw, 58px);
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px) 0 0 / clamp(46px, 8vw, 116px) clamp(46px, 8vw, 116px),
        #080808;
    }

    main {
      display: grid;
      align-content: space-between;
      min-height: calc(100vh - clamp(44px, 8vw, 116px));
    }

    .topline {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      color: #bdbdbd;
      font-size: clamp(0.72rem, 0.68rem + 0.18vw, 0.86rem);
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 9ch;
      margin: 12vh 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(4.8rem, 16vw, 15rem);
      font-weight: 400;
      line-height: 0.84;
      letter-spacing: 0;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      border-top: 1px solid #777777;
      padding-top: 22px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 58px;
      min-width: min(100%, 270px);
      border: 1px solid #f2f2f2;
      background: #f2f2f2;
      color: #080808;
      padding: 18px 24px;
      font-size: 0.82rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      line-height: 1;
      text-transform: uppercase;
    }

    .button:hover,
    .button:focus-visible {
      background: #080808;
      color: #f2f2f2;
      outline: none;
    }

    .note {
      max-width: 28rem;
      margin: 0;
      color: #c8c8c8;
      font-size: clamp(0.96rem, 0.88rem + 0.32vw, 1.18rem);
      line-height: 1.55;
    }

    @media (max-width: 680px) {
      .topline,
      .actions {
        flex-direction: column;
        align-items: flex-start;
      }

      h1 {
        margin: 9vh 0;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="topline">
      <a href="index.html">1820</a>
      <span>Reservation</span>
    </div>

    <h1>Hold the room.</h1>

    <div class="actions">
      <p class="note">The reservation page is ready for your booking form, calendar, or external reservation provider.</p>
      <a class="button" href="index.html">Return</a>
    </div>
  </main>
</body>
</html>
